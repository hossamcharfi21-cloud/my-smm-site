<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW VPN - اللوحة الذكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --card: #111; --text-gray: #aaa; --input-bg: #1a1a1a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--main); font-size: 20px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-box { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; }
        .stat-box h3 { margin: 0; font-size: 16px; color: #fff; }
        .stat-box p { margin: 5px 0 0; color: var(--text-gray); font-size: 11px; }
        .platforms-wrapper { display: flex; overflow-x: auto; gap: 15px; padding: 15px; background: #050505; border-bottom: 1px solid #222; scrollbar-width: none; }
        .plat-btn { min-width: 65px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .plat-btn.active { opacity: 1; color: var(--main); }
        .order-form { padding: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 13px; }
        select, input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .price-box { background: rgba(255,0,0,0.1); border: 1px dashed var(--main); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; margin-top: 10px; }
        .confirm-btn { background: var(--main); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <div><i class="fas fa-bars"></i></div>
        <div class="logo">FOLLOW VPN</div>
        <div style="color: var(--main);"><i class="fas fa-user-circle"></i></div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><h3>$0.00305</h3><p>الرصيد</p></div> <div class="stat-box"><h3>$8.346</h3><p>المصروفات</p></div> <div class="stat-box"><h3>1,690,345</h3><p>الطلبات</p></div> <div class="stat-box" style="background:var(--main); border:none;"><h3>شحن</h3><p style="color:#fff">Binance</p></div>
    </div>

    <div class="platforms-wrapper">
        <div class="plat-btn active" onclick="filterByPlatform('Facebook')"><i class="fab fa-facebook"></i><span>فيسبوك</span></div>
        <div class="plat-btn" onclick="filterByPlatform('Instagram')"><i class="fab fa-instagram"></i><span>إنستقرام</span></div>
        <div class="plat-btn" onclick="filterByPlatform('TikTok')"><i class="fab fa-tiktok"></i><span>تيك توك</span></div>
        <div class="plat-btn" onclick="filterByPlatform('YouTube')"><i class="fab fa-youtube"></i><span>يوتيوب</span></div>
        <div class="plat-btn" onclick="filterByPlatform('Telegram')"><i class="fab fa-telegram"></i><span>تليجرام</span></div>
    </div>

    <div class="order-form">
        <label>القسم (سيتم تحميل كافة الأقسام...)</label>
        <select id="category-box" onchange="fillServices()"></select>

        <label>الخدمة (أكثر من 100 خدمة متاحة)</label>
        <select id="service-box" onchange="updatePrice()"></select>

        <label>الرابط</label>
        <input type="text" id="link" placeholder="أدخل الرابط هنا">

        <label>الكمية</label>
        <input type="number" id="qty" value="1000" oninput="updatePrice()">

        <div class="price-box">
            <span>التكلفة:</span>
            <b id="total-price">$0.00</b>
        </div>
        <button class="confirm-btn">تأكيد الطلب</button>
    </div>

    <script>
        const API_KEY = "9c3b0dbe1f0f040d32be6e2dc1dc12a68"; //
        const PROXY_URL = "https://cors-anywhere.herokuapp.com/"; // لتجاوز حماية CORS
        const API_URL = "https://evoiy.com/api/v2?action=services&key=" + API_KEY;

        let allServices = [];

        // جلب جميع الخدمات من الموقع الأصلي
        async function fetchAllServices() {
            try {
                const response = await fetch(PROXY_URL + API_URL);
                allServices = await response.json();
                filterByPlatform('Facebook'); // البدء بفيسبوك افتراضياً
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
                alert("يرجى تفعيل البروكسي لجلب العروض");
            }
        }

        function filterByPlatform(platName) {
            const catBox = document.getElementById('category-box');
            catBox.innerHTML = "";
            
            // استخراج الأقسام الفريدة التي تنتمي للمنصة المختارة
            const categories = [...new Set(allServices
                .filter(s => s.category.toLowerCase().includes(platName.toLowerCase()))
                .map(s => s.category))];

            categories.forEach(c => {
                catBox.options.add(new Option(c, c));
            });
            fillServices();
        }

        function fillServices() {
            const selectedCat = document.getElementById('category-box').value;
            const serBox = document.getElementById('service-box');
            serBox.innerHTML = "";

            const filtered = allServices.filter(s => s.category === selectedCat);
            filtered.forEach(s => {
                serBox.options.add(new Option(`${s.service} - $${s.rate} - ${s.name}`, s.rate));
            });
            updatePrice();
        }

        function updatePrice() {
            const rate = parseFloat(document.getElementById('service-box').value) || 0;
            const qty = parseInt(document.getElementById('qty').value) || 0;
            document.getElementById('total-price').innerText = "$" + ((rate * qty) / 1000).toFixed(4);
        }

        window.onload = fetchAllServices;
    </script>
</body>
</html>
