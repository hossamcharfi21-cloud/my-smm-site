<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW VPN - اللوحة المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --card: #111; --text-gray: #aaa; --input-bg: #1a1a1a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* الهيدر */
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--main); font-size: 20px; font-weight: bold; }

        /* البطاقات الإحصائية */
        .stats-container { display: grid; gap: 10px; padding: 15px; }
        .stat-card { background: var(--card); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .stat-info h3 { margin: 0; font-size: 22px; color: #fff; }
        .stat-info p { margin: 5px 0 0; color: var(--text-gray); font-size: 12px; }

        /* شريط المنصات */
        .platforms-bar { display: flex; overflow-x: auto; gap: 20px; padding: 15px; background: #050505; border-bottom: 1px solid #222; scrollbar-width: none; }
        .platforms-bar::-webkit-scrollbar { display: none; }
        .platform-item { min-width: 60px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .platform-item.active { opacity: 1; transform: scale(1.1); color: var(--main); }
        .platform-item i { font-size: 22px; }

        /* قسم الطلبات */
        .order-section { padding: 20px; }
        .order-title { color: var(--main); border-right: 4px solid var(--main); padding-right: 10px; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 13px; }
        select, input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--main); }

        /* خانة السعر */
        .price-display { background: rgba(255,0,0,0.1); border: 1px dashed var(--main); padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .price-display span { color: var(--main); font-weight: bold; font-size: 18px; }

        .btn-order { background: var(--main); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }

        .fab-tele { position: fixed; bottom: 20px; left: 20px; background: #0088cc; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 24px; z-index: 100; }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="toggleSidebar()" style="cursor:pointer;"><i class="fas fa-bars"></i></div>
        <div class="logo">FOLLOW VPN</div>
        <div style="color: var(--main);"><i class="fas fa-user-circle"></i></div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-info"><h3 id="balance">$0.0030588</h3><p>رصيد الحساب</p></div>
            <i class="fas fa-wallet" style="color:#2ecc71"></i>
        </div>
    </div>

    <div class="platforms-bar">
        <div class="platform-item active" onclick="updateCategory('facebook')"><i class="fab fa-facebook" style="color:#1877f2"></i><span>فيسبوك</span></div>
        <div class="platform-item" onclick="updateCategory('instagram')"><i class="fab fa-instagram" style="color:#e4405f"></i><span>إنستقرام</span></div>
        <div class="platform-item" onclick="updateCategory('tiktok')"><i class="fab fa-tiktok"></i><span>تيك توك</span></div>
        <div class="platform-item" onclick="updateCategory('youtube')"><i class="fab fa-youtube" style="color:#ff0000"></i><span>يوتيوب</span></div>
        <div class="platform-item" onclick="updateCategory('telegram')"><i class="fab fa-telegram" style="color:#0088cc"></i><span>تليجرام</span></div>
    </div>

    <div class="order-section">
        <div class="order-title">إضافة طلب جديد</div>
        
        <div class="input-group">
            <label>الفئة (Category)</label>
            <select id="category-select" onchange="updateServices()"></select>
        </div>

        <div class="input-group">
            <label>الخدمة (Service)</label>
            <select id="service-select" onchange="calculatePrice()"></select>
        </div>

        <div class="input-group">
            <label>الرابط (Link)</label>
            <input type="text" placeholder="أدخل الرابط هنا">
        </div>

        <div class="input-group">
            <label>الكمية (Quantity)</label>
            <input type="number" id="quantity" oninput="calculatePrice()" placeholder="أقل كمية: 100">
        </div>

        <div class="price-display">
            <p style="margin:0; font-size:14px;">إجمالي الثمن المتوقع:</p>
            <span id="total-price">$0.00</span>
        </div>

        <button class="btn-order">تأكيد الطلب</button>
    </div>

    <a href="https://t.me/VPN_Dzz" class="fab-tele"><i class="fab fa-telegram-plane"></i></a>

    <script>
        // قاعدة بيانات العروض (يمكنك إضافة كل عروض الموقع هنا بنفس التنسيق)
        const allData = {
            facebook: {
                categories: ["فيسبوك تفاعل [الأرخص]", "فيسبوك متابعين", "مشاهدات فيديوهات"],
                services: {
                    "فيسبوك تفاعل [الأرخص]": [
                        {id: 1366, name: "تفاعل منشورات (Like) - $0.80", price: 0.80},
                        {id: 1367, name: "تفاعل منشورات (Love) - $0.95", price: 0.95}
                    ],
                    "فيسبوك متابعين": [
                        {id: 1400, name: "متابعين صفحة ضمان - $1.50", price: 1.50}
                    ]
                }
            },
            instagram: {
                categories: ["إنستغرام متابعين", "إنستغرام لايكات"],
                services: {
                    "إنستغرام متابعين": [
                        {id: 2001, name: "متابعين ضمان 30 يوم - $1.10", price: 1.10}
                    ],
                    "إنستغرام لايكات": [
                        {id: 2005, name: "لايكات حقيقية - $0.20", price: 0.20}
                    ]
                }
            },
            tiktok: {
                categories: ["تيك توك مشاهدات", "تيك توك متابعين"],
                services: {
                    "تيك توك مشاهدات": [
                        {id: 3001, name: "مشاهدات سريعة - $0.05", price: 0.05}
                    ],
                    "تيك توك متابعين": [
                        {id: 3005, name: "متابعين سريع - $2.00", price: 2.00}
                    ]
                }
            }
            // يمكنك إضافة يوتيوب وتليجرام بنفس الطريقة
        };

        let currentPlatform = 'facebook';

        function updateCategory(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.platform-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const catSelect = document.getElementById('category-select');
            catSelect.innerHTML = "";
            
            allData[platform].categories.forEach(cat => {
                let opt = document.createElement('option');
                opt.value = cat; opt.textContent = cat;
                catSelect.appendChild(opt);
            });
            updateServices();
        }

        function updateServices() {
            const cat = document.getElementById('category-select').value;
            const servSelect = document.getElementById('service-select');
            servSelect.innerHTML = "";
            
            allData[currentPlatform].services[cat].forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.price;
                opt.textContent = s.name;
                servSelect.appendChild(opt);
            });
            calculatePrice();
        }

        function calculatePrice() {
            const pricePerThousand = parseFloat(document.getElementById('service-select').value);
            const qty = parseFloat(document.getElementById('quantity').value) || 0;
            const total = (pricePerThousand * qty) / 1000;
            document.getElementById('total-price').innerText = "$" + total.toFixed(4);
        }

        window.onload = () => { updateCategory('facebook'); };
    </script>
</body>
</html>
