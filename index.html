<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW VPN - اللوحة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --card: #111; --text-gray: #aaa; --input-bg: #1a1a1a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--main); font-size: 20px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-box { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #222; text-align: center; }
        .stat-box h3 { margin: 0; font-size: 14px; color: #fff; }
        .stat-box p { margin: 5px 0 0; color: var(--text-gray); font-size: 10px; }
        .platforms-bar { display: flex; overflow-x: auto; gap: 15px; padding: 15px; background: #050505; border-bottom: 1px solid #222; scrollbar-width: none; }
        .plat-item { min-width: 65px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .plat-item.active { opacity: 1; color: var(--main); transform: scale(1.1); }
        .order-section { padding: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 13px; }
        select, input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 13px; margin-bottom: 15px; outline: none; }
        .price-display { background: rgba(255,0,0,0.1); border: 1px dashed var(--main); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-order { background: var(--main); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <div><i class="fas fa-bars"></i></div>
        <div class="logo">FOLLOW VPN</div>
        <div style="color: var(--main);"><i class="fas fa-user-circle"></i></div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><h3>$0.0030588</h3><p>رصيد الحساب</p></div> <div class="stat-box"><h3>$8.3469412</h3><p>المصروفات</p></div> <div class="stat-box"><h3>1,690,345</h3><p>إجمالي الطلبات</p></div> <div class="stat-box" style="background:var(--main); border:none;"><h3>شحن رصيد</h3><p style="color:#fff">Binance Pay</p></div>
    </div>

    <div class="platforms-bar">
        <div class="plat-item active" onclick="setPlat('fb', this)"><i class="fab fa-facebook"></i><span>فيسبوك</span></div>
        <div class="plat-item" onclick="setPlat('ig', this)"><i class="fab fa-instagram"></i><span>إنستقرام</span></div>
        <div class="plat-item" onclick="setPlat('tk', this)"><i class="fab fa-tiktok"></i><span>تيك توك</span></div>
        <div class="plat-item" onclick="setPlat('yt', this)"><i class="fab fa-youtube"></i><span>يوتيوب</span></div>
        <div class="plat-item" onclick="setPlat('tg', this)"><i class="fab fa-telegram"></i><span>تليجرام</span></div>
    </div>

    <div class="order-section">
        <label>الفئة (Category)</label>
        <select id="cat" onchange="updateSer()"></select>

        <label>الخدمة (Service)</label>
        <select id="ser" onchange="calc()"></select>

        <label>الرابط (Link)</label>
        <input type="text" id="link" placeholder="أدخل الرابط هنا">

        <label>الكمية (Quantity)</label>
        <input type="number" id="qty" value="1000" oninput="calc()">

        <div class="price-display">
            <span>إجمالي السعر:</span>
            <span id="total" style="color:var(--main); font-weight:bold; font-size:18px;">$0.00</span>
        </div>
        <button class="btn-order">تأكيد الطلب</button>
    </div>

    <script>
        // قاعدة البيانات الشاملة لجميع العروض من صورك
        const db = {
            fb: {
                cats: [
                    "فيسبوك تفاعل منشورات ❤️ [الأرخص]", 
                    "مشاهدات فيديوهات فيسبوك [أفضل سرعة]",
                    "وقت المشاهدة على فيسبوك [60 ألف دقيقة]",
                    "أعضاء مجموعة فيسبوك [حسابات حقيقية]",
                    "متابعين بروفايل فيسبوك [سريع]",
                    "لايكات صفحات فيسبوك [ضمان]"
                ],
                servs: {
                    "فيسبوك تفاعل منشورات ❤️ [الأرخص]": [
                        {n: "1366 - Facebook Post React [Like 👍] - $0.80", p: 0.80},
                        {n: "1367 - Facebook Post React [Love ❤️] - $0.90", p: 0.90},
                        {n: "1368 - Facebook Post React [Haha 😂] - $0.90", p: 0.90},
                        {n: "تفاعل منشورات (منوع) - $0.75", p: 0.75}
                    ],
                    "مشاهدات فيديوهات فيسبوك [أفضل سرعة]": [
                        {n: "مشاهدات فيديو [سريعة جداً] - $0.12", p: 0.12},
                        {n: "مشاهدات ريلز فيسبوك [الأرخص] - $0.10", p: 0.10},
                        {n: "مشاهدات بث مباشر - $5.50", p: 5.50}
                    ],
                    "وقت المشاهدة على فيسبوك [60 ألف دقيقة]": [
                        {n: "60k Minutes Viewtime [ضمان] - $4.40", p: 4.40}
                    ],
                    "أعضاء مجموعة فيسبوك [حسابات حقيقية]": [
                        {n: "Group Members [جودة عالية] - $2.15", p: 2.15}
                    ],
                    "متابعين بروفايل فيسبوك [سريع]": [
                        {n: "متابعين بروفايل (عالمي) - $1.20", p: 1.20}
                    ],
                    "لايكات صفحات فيسبوك [ضمان]": [
                        {n: "لايكات ومتابعين صفحة (ضمان 30 يوم) - $1.60", p: 1.60}
                    ]
                }
            },
            ig: {
                cats: [
                    "إنستغرام متابعين [ضمان]", 
                    "لايكات إنستغرام [حقيقية]",
                    "مشاهدات إنستغرام [ريلز/فيديو]",
                    "متابعو سلاسل الرسائل [الأفضل أداءً]",
                    "خدمات قصص إنستغرام (Story)"
                ],
                servs: {
                    "إنستغرام متابعين [ضمان]": [
                        {n: "متابعين ضمان 30 يوم - $1.10", p: 1.10},
                        {n: "متابعين ضمان مدى الحياة - $1.45", p: 1.45}
                    ],
                    "لايكات إنستغرام [حقيقية]": [
                        {n: "لايكات سريعة جداً - $0.18", p: 0.18},
                        {n: "لايكات من حسابات حقيقية - $0.35", p: 0.35}
                    ],
                    "مشاهدات إنستغرام [ريلز/فيديو]": [
                        {n: "مشاهدات ريلز [تحدي السعر] - $0.05", p: 0.05}
                    ],
                    "متابعو سلاسل الرسائل [الأفضل أداءً]": [
                        {n: "Threads Followers [NEW] - $1.20", p: 1.20}
                    ],
                    "خدمات قصص إنستغرام (Story)": [
                        {n: "مشاهدات ستوري إنستغرام - $0.12", p: 0.12}
                    ]
                }
            },
            tk: {
                cats: [
                    "مشاهدات تيك توك [تحدي السوق]", 
                    "تيك توك متابعين [سريع]",
                    "إعجابات تيك توك [تايلاند]",
                    "تيك توك مشاركات وحفظ"
                ],
                servs: {
                    "مشاهدات تيك توك [تحدي السوق]": [
                        {n: "مشاهدات تيك توك [أرخص سعر] - $0.01", p: 0.01},
                        {n: "مشاهدات تيك توك [سريع] - $0.03", p: 0.03}
                    ],
                    "تيك توك متابعين [سريع]": [
                        {n: "متابعين تيك توك [NEW] - $1.95", p: 1.95}
                    ],
                    "إعجابات تيك توك [تايلاند]": [
                        {n: "إعجابات تيك توك 🇹🇭 - $0.48", p: 0.48}
                    ],
                    "تيك توك مشاركات وحفظ": [
                        {n: "تيك توك مشاركات (Shares) - $0.08", p: 0.08}
                    ]
                }
            },
            yt: {
                cats: ["مشاهدات يوتيوب [بدون إعادة تعبئة]", "مشتركين يوتيوب", "يوتيوب ساعات المشاهدة"],
                servs: {
                    "مشاهدات يوتيوب [بدون إعادة تعبئة]": [
                        {n: "مشاهدات يوتيوب الأرخص - $1.80", p: 1.80}
                    ],
                    "مشتركين يوتيوب": [
                        {n: "مشتركين يوتيوب [ضمان] - $12.50", p: 12.50}
                    ],
                    "يوتيوب ساعات المشاهدة": [
                        {n: "4000 ساعة مشاهدة [ضمان] - $25.00", p: 25.00}
                    ]
                }
            }
        };

        let currentPlat = 'fb';

        function setPlat(p, el) {
            currentPlat = p;
            document.querySelectorAll('.plat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const cS = document.getElementById('cat');
            cS.innerHTML = "";
            db[p].cats.forEach(c => cS.innerHTML += `<option>${c}</option>`);
            updateSer();
        }

        function updateSer() {
            const cat = document.getElementById('cat').value;
            const sS = document.getElementById('ser');
            sS.innerHTML = "";
            db[currentPlat].servs[cat].forEach(s => sS.innerHTML += `<option value="${s.p}">${s.n}</option>`);
            calc();
        }

        function calc() {
            const rate = parseFloat(document.getElementById('ser').value) || 0;
            const q = parseInt(document.getElementById('qty').value) || 0;
            document.getElementById('total').innerText = "$" + ((rate * q) / 1000).toFixed(4);
        }

        window.onload = () => setPlat('fb', document.querySelector('.plat-item'));
    </script>
</body>
</html>
