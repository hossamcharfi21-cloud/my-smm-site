<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLLOW VPN | لوحة الخدمات الشاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #ff0000; --bg: #000; --card: #111; --input: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--main); display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-box { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #222; text-align: center; }
        .stat-box h3 { margin: 0; font-size: 14px; color: #fff; }
        .stat-box p { margin: 5px 0 0; color: #aaa; font-size: 10px; }
        .order-container { padding: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 13px; }
        select, input, textarea { width: 100%; padding: 14px; background: var(--input); border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .description-box { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 8px; font-size: 12px; color: #00ff00; margin-bottom: 15px; min-height: 50px; }
        .btn-order { background: var(--main); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #loading { text-align: center; color: var(--main); display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; color: var(--main);">FOLLOW VPN</div>
        <i class="fas fa-bars"></i>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><h3>$0.0030588</h3><p>الرصيد المتاح</p></div> <div class="stat-box"><h3>$8.3469412</h3><p>المصروفات</p></div> </div>

    <div class="order-container">
        <h2 style="font-size: 18px; border-right: 3px solid var(--main); padding-right: 10px;">إضافة طلب جديد</h2>
        
        <div id="loading"><i class="fas fa-spinner fa-spin"></i> جاري جلب جميع العروض...</div>

        <label>الفئة (Category)</label>
        <select id="category" onchange="filterServices()"><option>تحميل الفئات...</option></select>

        <label>الخدمة (Service)</label>
        <select id="service" onchange="updateDetails()"><option>اختر الفئة أولاً...</option></select>

        <label>وصف الخدمة</label>
        <div id="service-desc" class="description-box">سيظهر هنا تفاصيل السرعة والضمان...</div>

        <label>الرابط (Link)</label>
        <input type="text" id="link" placeholder="https://www.example.com/...">

        <label>الكمية (Quantity)</label>
        <input type="number" id="quantity" value="100" oninput="calculatePrice()">

        <div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,0,0,0.1); border-radius:10px; margin-bottom:15px;">
            <span>السعر الإجمالي:</span>
            <span id="total-price" style="color:var(--main); font-weight:bold;">$0.00</span>
        </div>

        <button class="btn-order">تأكيد الطلب الآن</button>
    </div>

    <script>
        // مفتاح API الخاص بك من الصورة
        const API_KEY = '9c3b0dbe1df040d32be6e2dc1dc12a68';
        const PROXY_URL = 'https://api.allorigins.win/raw?url='; // لتجاوز حماية CORS
        const API_URL = 'https://evoiy.com/api/v2?action=services&key=' + API_KEY;

        let allServices = [];

        async function fetchAllServices() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(API_URL));
                allServices = await response.json();
                
                // استخراج الفئات الفريدة
                const categories = [...new Set(allServices.map(s => s.category))];
                const catSelect = document.getElementById('category');
                catSelect.innerHTML = '';
                
                categories.forEach(cat => {
                    let option = document.createElement('option');
                    option.value = cat;
                    option.innerText = cat;
                    catSelect.appendChild(option);
                });

                filterServices();
            } catch (error) {
                alert('خطأ في جلب البيانات، يرجى تفعيل البروكسي أو التأكد من API KEY');
            }
            document.getElementById('loading').style.display = 'none';
        }

        function filterServices() {
            const selectedCat = document.getElementById('category').value;
            const serSelect = document.getElementById('service');
            serSelect.innerHTML = '';

            const filtered = allServices.filter(s => s.category === selectedCat);
            filtered.forEach(s => {
                let option = document.createElement('option');
                option.value = s.service;
                option.setAttribute('data-rate', s.rate);
                option.innerText = `${s.name} - $${s.rate}`;
                serSelect.appendChild(option);
            });
            updateDetails();
        }

        function updateDetails() {
            const serSelect = document.getElementById('service');
            const selectedId = serSelect.value;
            const service = allServices.find(s => s.service == selectedId);
            
            if(service) {
                // عرض الوصف الأصلي من الموقع
                document.getElementById('service-desc').innerText = `الحد الأدنى: ${service.min} | الحد الأقصى: ${service.max}`;
            }
            calculatePrice();
        }

        function calculatePrice() {
            const serSelect = document.getElementById('service');
            const selectedOption = serSelect.options[serSelect.selectedIndex];
            const rate = selectedOption ? parseFloat(selectedOption.getAttribute('data-rate')) : 0;
            const qty = parseInt(document.getElementById('quantity').value) || 0;
            
            const total = (rate * qty) / 1000;
            document.getElementById('total-price').innerText = "$" + total.toFixed(4);
        }

        // بدء الجلب عند فتح الصفحة
        window.onload = fetchAllServices;
    </script>
</body>
</html>
